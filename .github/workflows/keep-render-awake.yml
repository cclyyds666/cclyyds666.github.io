name: Keep Render Awake

on:
  schedule:
    # Every 12 minutes (UTC). Free Render instances sleep after ~15m idle.
    - cron: '*/12 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          set -euo pipefail
          URL="${{ vars.RENDER_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            URL="https://cclyyds666-personal-site-h8kk.onrender.com/api/health"
          fi
          echo "Pinging $URL"
          curl -fsS --retry 2 --retry-delay 5 --max-time 45 "$URL"
          echo
          echo "ok"
