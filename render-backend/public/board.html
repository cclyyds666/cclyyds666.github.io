</nav><div><p class="eyebrow">Guestbook</p><h1>留言树洞</h1><p>把想说的话留在这里。动态服务未连接时，页面会保留静态说明；连接 Render API 后即可提交和展示留言。</p></div></header><main><section class="panel board-layout"><div class="message-form"><h3>写一条留言</h3><input id="message-name" type="text" placeholder="昵称，可留空"><textarea id="message-content" placeholder="想说的话"></textarea><input class="hidden-field" id="message-website" type="text" tabindex="-1" autocomplete="off"><button type="button" onclick="createMessage()">提交留言</button><p id="board-status" class="status-text">正在连接留言服务……</p></div><div><h3>最近留言</h3><div id="messages"></div></div></section></main><footer>
    <p>愿这里一直保存热爱、真诚和慢慢变好的自己。</p>
    <p>&copy; 2026 Made by Ccl &nbsp;|&nbsp; 本站累计访问 <span id="visitCount">--</span> 次</p>
</footer></div><script>
const API_BASE_URL = window.SITE_API_BASE_URL || 'https://cclyyds666-personal-site-h8kk.onrender.com';
function apiUrl(path) { return `${API_BASE_URL}${path}`; }
function status(message) { document.getElementById('board-status').textContent = message; }
async function requestJson(path, options = {}) { const { headers: optHeaders, ...restOptions } = options; const headers = { 'Content-Type': 'application/json', ...optHeaders }; const res = await fetch(apiUrl(path), { headers, ...restOptions }); const text = await res.text(); const data = text ? JSON.parse(text) : {}; if (!res.ok) throw new Error(data.message || '请求失败'); return data; }
function renderMessage(item) { const card = document.createElement('article'); const name = document.createElement('h4'); const content = document.createElement('p'); const meta = document.createElement('small'); card.className = 'message-card'; name.textContent = item.name; content.textContent = item.content; meta.textContent = new Date(item.createdAt).toLocaleString(); card.append(name, content, meta); return card; }
async function loadMessages() { const wrap = document.getElementById('messages'); try { const data = await requestJson('/api/messages?limit=12'); wrap.replaceChildren(...data.items.map(renderMessage)); status(data.items.length ? '留言已同步。' : '还没有留言，来写第一条吧。'); } catch (error) { wrap.innerHTML = '<article class="message-card"><h4>留言服务暂未连接</h4><p>部署到 GitHub Pages 后，请设置 Render API 地址以启用动态留言。</p><small>静态页面可以正常浏览。</small></article>'; status('暂未连接到动态服务。'); } }
async function createMessage() { try { const name = document.getElementById('message-name').value; const content = document.getElementById('message-content').value; const website = document.getElementById('message-website').value; await requestJson('/api/messages', { method: 'POST', body: JSON.stringify({ name, content, website }) }); document.getElementById('message-content').value = ''; status('留言成功。'); loadMessages(); } catch (error) { status(error.message); } }
loadMessages();
</script><script src="site-visit.js"></script></body></html>
