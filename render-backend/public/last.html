<div class="music-player-float hidden" id="musicPlayerFloat">
    <div class="player-header">
        <span>🎵 网易云音乐</span>
        <button class="collapse-btn" onclick="toggleMusicCollapse()">-</button>
    </div>
    <iframe src="https://music.163.com/outchain/player?type=0&id=505947676&auto=1&height=66" allow="autoplay"></iframe>
</div>
<button class="music-player-toggle hidden" id="musicToggle" onclick="toggleMusicPlayer()">🎵</button>
<script>
    const API_BASE_URL = window.SITE_API_BASE_URL || 'https://cclyyds666-personal-site-h8kk.onrender.com';
    function apiUrl(path) { return `${API_BASE_URL}${path}`; }
    async function requestJson(path, options = {}) {
        const { headers: optHeaders, ...restOptions } = options;
        const headers = { 'Content-Type': 'application/json', ...optHeaders };
        const res = await fetch(apiUrl(path), { headers, ...restOptions });
        const text = await res.text();
        const data = text ? JSON.parse(text) : {};
        if (!res.ok) throw new Error(data.message || '请求失败');
        return data;
    }
    (function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
    function toggleTheme() {
        const el = document.documentElement;
        const isDark = el.getAttribute('data-theme') === 'dark';
        el.setAttribute('data-theme', isDark ? '' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        document.querySelectorAll('.theme-toggle').forEach(btn => btn.textContent = isDark ? '🌙' : '☀️');
    }
    function toggleMusicPlayer() {
        const fp = document.getElementById('musicPlayerFloat');
        const tg = document.getElementById('musicToggle');
        const show = fp.classList.toggle('hidden');
        tg.classList.toggle('hidden', show);
    }
    function toggleMusicCollapse() {
        const fp = document.getElementById('musicPlayerFloat');
        fp.classList.toggle('collapsed');
    }
    async function loadVisitCount() {
        try {
            const data = await requestJson('/api/visits/count');
            document.getElementById('visitCount').textContent = data.total;
        } catch { /* ignore */ }
    }
    function recordVisit() {
        const path = window.location.pathname;
        if (navigator.sendBeacon) {
            navigator.sendBeacon(apiUrl('/api/visit'), JSON.stringify({ path }));
        } else {
            fetch(apiUrl('/api/visit'), { method: 'POST', body: JSON.stringify({ path }), headers: { 'Content-Type': 'application/json' } }).catch(() => {});
        }
    }
    loadVisitCount();
    recordVisit();
</script>
