services:
  - type: web
    name: cclyyds
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: DATABASE_PATH
        value: data/site.sqlite
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://cclyyds666.github.io
