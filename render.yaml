services:
  - type: web
    name: cclyyds666-personal-site
    runtime: node
    plan: free
    buildCommand: cd render-backend && npm ci
    startCommand: cd render-backend && npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://cclyyds666.github.io
